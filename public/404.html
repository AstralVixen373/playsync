<!DOCTYPE html>
<html lang="en">
<head>
  <title>404 — Page not found | PlaySync</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Work+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }

    body {
      background: #1A0A3D;
      color: #E0E4FC;
      display: grid;
      place-items: center;
      min-height: 100dvh;
      font-family: 'Work Sans', Helvetica, sans-serif;
      padding: 2rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .icon {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .code {
      font-family: 'Nunito', Helvetica, sans-serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #8E72E0 0%, #735BC8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-family: 'Nunito', Helvetica, sans-serif;
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 800;
      color: #EDE9FF;
      margin-top: 0.25rem;
    }

    p {
      font-size: 1rem;
      color: #8C97DF;
      max-width: 32ch;
      line-height: 1.6;
      margin-top: 0.5rem;
    }

    a {
      display: inline-block;
      margin-top: 1.5rem;
      background: linear-gradient(135deg, #8E72E0 0%, #735BC8 100%);
      color: #fff;
      font-family: 'Nunito', Helvetica, sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.65rem 1.75rem;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <main>
    <div class="icon">🎮</div>
    <div class="code">404</div>
    <h1>This lobby doesn't exist</h1>
    <p>The page you're looking for has moved, been deleted, or never existed.</p>
    <a href="https://www.playsync.space">Back to Playsync</a>
  </main>
</body>
</html>
